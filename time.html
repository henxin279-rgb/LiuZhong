<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>时之镜像 - 精神花园</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --oled-black: #000000; --bg-dark: #0a0a0c; }
        body { margin: 0; overflow: hidden; background-color: var(--bg-dark); touch-action: none; font-family: 'Helvetica Neue', 'PingFang SC', sans-serif; transition: background-color 2s ease; -webkit-tap-highlight-color: transparent; }
        body.focus-mode { background-color: var(--oled-black); }
        
        canvas { display: block; position: absolute; inset: 0; z-index: 10; pointer-events: none; touch-action: none; }
        .interactive-layer { position: absolute; inset: 0; z-index: 20; touch-action: none; }
        
        /* 动画与过渡 */
        .fade-enter { opacity: 0; transition: opacity 0.8s ease-out; pointer-events: none; }
        .fade-enter-active { opacity: 1; pointer-events: auto; }
        .fade-exit { opacity: 1; transition: opacity 0.8s ease-in; }
        .fade-exit-active { opacity: 0; pointer-events: none; }
        
        /* 呼吸感文字 */
        .breathe-soft { animation: breatheSoft 3s infinite alternate ease-in-out; }
        @keyframes breatheSoft { from { opacity: 0.3; filter: blur(1px); } to { opacity: 0.8; filter: blur(0px); } }

        /* 情绪调色盘单选按钮 */
        .color-radio { appearance: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; margin: 0 10px; border: 2px solid transparent; }
        .color-radio:checked { transform: scale(1.3); border-color: white; }

        /* 长按进度环 */
        .progress-ring__circle { transition: stroke-dashoffset 0.1s linear; transform: rotate(-90deg); transform-origin: 50% 50%; }

        /* 画廊滚动条隐藏 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 晶体卡片悬浮效果 */
        .crystal-card { transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s; }
        .crystal-card:hover { transform: translateY(-5px) scale(1.05); }

        /* 手机端安全区域 */
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="text-white select-none antialiased">

    <!-- 核心绘画层 (混合模式设为滤色，交叠处发光) -->
    <canvas id="mainCanvas" style="mix-blend-mode: screen;"></canvas>
    
    <!-- 交互捕获层 (用于统一处理触摸和鼠标) -->
    <div id="touchLayer" class="interactive-layer"></div>

    <!-- ==================== 视图 1：主页 / 绘画页 ==================== -->
    <div id="view-home" class="absolute inset-0 z-30 flex flex-col justify-between safe-top safe-bottom p-5 pointer-events-none fade-enter fade-enter-active">
        
        <!-- 顶部极简状态栏 -->
        <div class="flex justify-between items-center pointer-events-auto">
            <button onclick="switchView('gallery')" class="p-3 opacity-60 hover:opacity-100 transition-opacity">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h7"></path></svg>
            </button>
            <!-- 轴数切换器 -->
            <button id="symmetryBtn" class="p-3 opacity-60 hover:opacity-100 transition-opacity flex items-center gap-2 text-sm font-mono tracking-widest">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v16m8-8H4m15.364-6.364l-12.728 12.728m0-12.728l12.728 12.728"></path></svg>
                <span id="symText">12 轴</span>
            </button>
        </div>

        <!-- 居中引导文案 -->
        <div id="centerPrompt" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-center transition-opacity duration-1000 opacity-50">
            <p class="tracking-[0.5em] text-sm font-light mb-2">今天想专注多久？</p>
            <p class="tracking-[1em] text-xs text-gray-500">画出来吧</p>
        </div>
        
        <!-- 跟随时间的呼吸光晕 -->
        <div id="timeEstimate" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-5xl font-mono font-light opacity-0 transition-opacity duration-500 text-white/20 pointer-events-none" style="text-shadow: 0 0 30px currentColor;">
            00
        </div>

        <!-- 底部悬浮工具栏 (默认隐藏) -->
        <div id="bottomToolbar" class="flex flex-col items-center gap-5 pointer-events-auto opacity-0 translate-y-8 transition-all duration-700 ease-out safe-bottom">
            <!-- 情绪调色盘 -->
            <div class="flex items-center bg-white/5 backdrop-blur-md rounded-full px-6 py-4 border border-white/10 shadow-2xl">
                <input type="radio" name="mood" class="color-radio" style="background: hsl(210, 80%, 60%); box-shadow: 0 0 10px hsl(210,80%,60%)" value="210" checked>
                <input type="radio" name="mood" class="color-radio" style="background: hsl(150, 60%, 50%); box-shadow: 0 0 10px hsl(150,60%,50%)" value="150">
                <input type="radio" name="mood" class="color-radio" style="background: hsl(280, 70%, 60%); box-shadow: 0 0 10px hsl(280,70%,60%)" value="280">
                <input type="radio" name="mood" class="color-radio" style="background: hsl(35, 90%, 60%); box-shadow: 0 0 10px hsl(35,90%,60%)" value="35">
            </div>
            
            <div class="flex items-center gap-6">
                <button onclick="clearCanvas()" class="text-xs tracking-widest opacity-50 hover:opacity-100 px-5 py-3 uppercase">清空</button>
                <button onclick="startFocus()" class="bg-white text-black px-10 py-4 rounded-full tracking-[0.3em] font-medium text-sm hover:scale-105 active:scale-95 transition-transform shadow-[0_0_20px rgba(255,255,255,0.3)]">
                    开始流逝
                </button>
            </div>
        </div>
    </div>

    <!-- ==================== 视图 2：专注进行页 ==================== -->
    <div id="view-focus" class="absolute inset-0 z-40 flex flex-col items-center justify-between safe-bottom pointer-events-none fade-enter hidden">
        <div class="flex-1 flex items-center justify-center w-full relative">
            <!-- 点击屏幕显示的隐形时间 -->
            <div id="hiddenTime" class="text-6xl font-mono font-extralight tracking-widest opacity-0 transition-all duration-1000 filter blur-sm">
                25:00
            </div>
            <!-- 全局隐形点击区 -->
            <div id="revealBtn" class="absolute inset-0 pointer-events-auto cursor-pointer"></div>
        </div>

        <!-- 底部长按放弃区 -->
        <div class="pb-8 pointer-events-auto relative flex flex-col items-center justify-center">
            <!-- SVG 圆环进度条 -->
            <svg class="absolute w-24 h-24 -z-10 opacity-50" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" fill="transparent" stroke="#333" stroke-width="4"/>
                <circle id="cancelRing" class="progress-ring__circle" cx="50" cy="50" r="45" fill="transparent" stroke="#ff4757" stroke-width="4" stroke-dasharray="283" stroke-dashoffset="283"/>
            </svg>
            <button id="cancelBtn" class="w-20 h-20 rounded-full flex items-center justify-center text-xs text-white/30 tracking-widest hover:text-white/80 transition-colors backdrop-blur-sm">
                放弃
            </button>
        </div>
    </div>

    <!-- ==================== 视图 3：时间标本画廊 ==================== -->
    <div id="view-gallery" class="absolute inset-0 z-50 bg-[#050508] flex flex-col fade-enter hidden overflow-y-auto no-scrollbar pointer-events-auto">
        
        <!-- 画廊头部 -->
        <div class="sticky top-0 bg-gradient-to-b from-[#050508] to-transparent pt-12 pb-8 px-5 z-10 flex justify-between items-start safe-top">
            <div>
                <h2 class="text-3xl font-light mb-2 tracking-widest text-white/90">精神花园</h2>
                <p id="galleryStats" class="text-sm text-gray-400 tracking-wider font-light">
                    本周，你为自己留白了 <span class="text-white">0</span> 小时。
                </p>
            </div>
            <button onclick="switchView('home')" class="p-3 opacity-60 hover:opacity-100 transition-opacity bg-white/10 rounded-full">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>

        <!-- 瀑布流/星空阵列展示区 -->
        <div id="galleryGrid" class="flex-1 px-5 pb-20 grid grid-cols-2 gap-5 auto-rows-max">
            <!-- JS 动态注入历史记录卡片 -->
        </div>
    </div>


    <!-- ==================== 核心逻辑脚本 ==================== -->
    <script>
        /**
         * 1. 状态与基础配置
         */
        const VIEWS = { HOME: 'home', FOCUS: 'focus', GALLERY: 'gallery' };
        let currentView = VIEWS.HOME;
        
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        let width, height, cx, cy;
        
        let symCount = 12;
        let mainHue = 210;
        let strokes = [];
        let currentStroke = null;
        let globalLength = 0;
        let timeMinutes = 0;
        
        let timeRemainingMs = 0;
        let totalTimeMs = 0;
        let isFocusing = false;
        let lastFrameTime = 0;
        let particles = [];
        let animationId = null;
        
        const uiHome = document.getElementById('view-home');
        const uiFocus = document.getElementById('view-focus');
        const uiGallery = document.getElementById('view-gallery');
        const centerPrompt = document.getElementById('centerPrompt');
        const bottomToolbar = document.getElementById('bottomToolbar');
        const timeEstimate = document.getElementById('timeEstimate');
        const symText = document.getElementById('symText');
        const hiddenTime = document.getElementById('hiddenTime');
        
        let audioCtx, noiseNode, filterNode, gainNode;

        /**
         * 2. 初始化与基础工具
         */
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            cx = width / 2;
            cy = height / 2;
            if(!isFocusing) renderCanvas();
        }
        window.addEventListener('resize', resize);
        resize();

        function switchView(viewName) {
            currentView = viewName;
            [uiHome, uiFocus, uiGallery].forEach(el => {
                el.classList.remove('fade-enter-active');
                setTimeout(() => {
                    if (currentView !== el.id.replace('view-', '')) el.classList.add('hidden');
                }, 800);
            });
            
            const targetEl = document.getElementById(`view-${viewName}`);
            targetEl.classList.remove('hidden');
            void targetEl.offsetWidth;
            targetEl.classList.add('fade-enter-active');

            if (viewName === VIEWS.GALLERY) {
                renderGallery();
                document.body.classList.remove('focus-mode');
            } else if (viewName === VIEWS.FOCUS) {
                document.body.classList.add('focus-mode');
            } else {
                document.body.classList.remove('focus-mode');
                resetState();
            }
        }

        /**
         * 3. 历史记录系统
         */
        const Storage = {
            getKey: () => 'flow_pomodoro_history',
            load: () => JSON.parse(localStorage.getItem(Storage.getKey()) || '[]'),
            save: (record) => {
                const data = Storage.load();
                data.unshift(record);
                if(data.length > 50) data.pop();
                localStorage.setItem(Storage.getKey(), JSON.stringify(data));
            }
        };

        function getCanvasSnapshot() {
            const offCanvas = document.createElement('canvas');
            const size = 400;
            offCanvas.width = size;
            offCanvas.height = size;
            const offCtx = offCanvas.getContext('2d');
            
            offCtx.fillStyle = '#0a0a0c';
            offCtx.fillRect(0, 0, size, size);
            
            const scale = Math.min(size / width, size / height) * 0.9;
            const dx = (size - width * scale) / 2;
            const dy = (size - height * scale) / 2;
            
            offCtx.globalCompositeOperation = 'screen';
            offCtx.drawImage(canvas, dx, dy, width * scale, height * scale);
            
            return offCanvas.toDataURL('image/jpeg', 0.8);
        }

        function renderGallery() {
            const history = Storage.load();
            const grid = document.getElementById('galleryGrid');
            const stats = document.getElementById('galleryStats');
            
            grid.innerHTML = '';
            
            if (history.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center text-gray-500 mt-20 tracking-widest font-light">这里还是一片荒芜。画出你的第一颗时间结晶吧。</div>';
                stats.innerHTML = '本周，你为自己留白了 <span class="text-white">0</span> 分钟。';
                return;
            }

            let totalMinutes = 0;
            
            history.forEach(record => {
                totalMinutes += record.duration;
                const date = new Date(record.timestamp);
                const dateStr = `${date.getMonth()+1}月${date.getDate()}日`;
                
                const glowSize = Math.min(record.duration * 2, 50);
                
                const card = document.createElement('div');
                card.className = 'crystal-card rounded-2xl p-4 flex flex-col items-center cursor-pointer border border-white/5 bg-white/5 backdrop-blur-sm';
                card.innerHTML = `
                    <div class="relative w-full aspect-square rounded-xl overflow-hidden mb-4" style="box-shadow: inset 0 0 ${glowSize}px ${record.color}40;">
                        <img src="${record.snapshot}" class="w-full h-full object-cover" style="mix-blend-mode: screen;" alt="结晶">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                        <div class="absolute bottom-2 left-3 right-3 flex justify-between items-end">
                            <span class="text-xs font-light tracking-wider">${dateStr}</span>
                            <span class="font-mono text-lg" style="color: ${record.color}">${record.duration}<span class="text-[10px] text-white/50 ml-1">MIN</span></span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });

            const hours = Math.floor(totalMinutes / 60);
            const mins = totalMinutes % 60;
            let timeText = hours > 0 ? `<span class="text-white">${hours}</span> 小时 <span class="text-white">${mins}</span> 分钟` : `<span class="text-white">${mins}</span> 分钟`;
            stats.innerHTML = `最近，你为自己留白了 ${timeText}。`;
        }

        /**
         * 4. 绘画层交互逻辑 (手机触摸优化)
         */
        let toolbarTimeout;
        const touchLayer = document.getElementById('touchLayer');

        // 手机端触摸事件兼容
        touchLayer.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            if (currentView !== VIEWS.HOME) return;
            initAudio();
            
            centerPrompt.style.opacity = '0';
            clearTimeout(toolbarTimeout);
            bottomToolbar.classList.remove('opacity-100', 'translate-y-0');
            bottomToolbar.classList.add('opacity-0', 'translate-y-8');
            
            timeEstimate.classList.remove('opacity-0');
            timeEstimate.classList.add('breathe-soft');
            
            setAudioState('drawing');
            
            const { x, y } = getCanvasCoords(e);
            currentStroke = { 
                points: [],
                lastSmoothX: x - cx,
                lastSmoothY: y - cy
            };
            currentStroke.points.push({ x: currentStroke.lastSmoothX, y: currentStroke.lastSmoothY, gl: globalLength });
            strokes.push(currentStroke);
        });

        touchLayer.addEventListener('pointermove', (e) => {
            e.preventDefault();
            if (currentView !== VIEWS.HOME || !currentStroke) return;
            
            const { x, y } = getCanvasCoords(e);
            const rawX = x - cx; 
            const rawY = y - cy;
            
            const smoothing = 0.3;
            const smoothX = currentStroke.lastSmoothX + (rawX - currentStroke.lastSmoothX) * smoothing;
            const smoothY = currentStroke.lastSmoothY + (rawY - currentStroke.lastSmoothY) * smoothing;
            
            const dist = Math.sqrt((smoothX - currentStroke.lastSmoothX)**2 + (smoothY - currentStroke.lastSmoothY)**2);
            
            if (dist > 1.5) {
                globalLength += dist;
                currentStroke.points.push({ x: smoothX, y: smoothY, gl: globalLength });
                
                currentStroke.lastSmoothX = smoothX;
                currentStroke.lastSmoothY = smoothY;
                
                timeMinutes = Math.max(1, Math.floor(globalLength / 150));
                timeEstimate.innerText = timeMinutes.toString().padStart(2, '0');
                
                if(filterNode) filterNode.frequency.value = Math.min(2500, 1000 + dist * 30);
                renderCanvas();
            }
        });

        touchLayer.addEventListener('pointerup', (e) => {
            e.preventDefault();
            if (currentView !== VIEWS.HOME) return;
            currentStroke = null;
            
            setAudioState('silence');
            timeEstimate.classList.remove('breathe-soft');
            
            if (globalLength > 0) {
                toolbarTimeout = setTimeout(() => {
                    bottomToolbar.classList.remove('opacity-0', 'translate-y-8');
                    bottomToolbar.classList.add('opacity-100', 'translate-y-0');
                    timeEstimate.classList.add('opacity-0');
                }, 1000);
            }
        });

        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            return { 
                x: e.clientX - rect.left, 
                y: e.clientY - rect.top 
            };
        }

        document.querySelectorAll('input[name="mood"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                mainHue = parseInt(e.target.value);
                renderCanvas();
            });
        });

        document.getElementById('symmetryBtn').addEventListener('click', () => {
            const options = [4, 6, 8, 12];
            let idx = options.indexOf(symCount);
            symCount = options[(idx + 1) % options.length];
            symText.innerText = `${symCount} 轴`;
            if (globalLength > 0) renderCanvas();
        });

        function clearCanvas() {
            strokes = []; globalLength = 0; timeMinutes = 0;
            timeEstimate.innerText = '00';
            centerPrompt.style.opacity = '0.5';
            bottomToolbar.classList.remove('opacity-100', 'translate-y-0');
            bottomToolbar.classList.add('opacity-0', 'translate-y-8');
            renderCanvas();
        }

        /**
         * 5. 专注模式与动画逻辑
         */
        function getBaseColor() { return `hsl(${mainHue}, 80%, 60%)`; }

        function startFocus() {
            if (globalLength < 50) return;
            
            renderCanvas();
            const snapshotBase64 = getCanvasSnapshot();
            
            timeRemainingMs = timeMinutes * 60 * 1000;
            totalTimeMs = timeRemainingMs;
            isFocusing = true;
            
            window.currentSessionData = {
                duration: timeMinutes,
                color: getBaseColor(),
                snapshot: snapshotBase64,
                timestamp: Date.now()
            };

            switchView(VIEWS.FOCUS);
            setAudioState('focus');
            
            canvas.classList.add('breathe-soft');
            setTimeout(() => canvas.classList.remove('breathe-soft'), 3000);
            
            lastFrameTime = performance.now();
            animationId = requestAnimationFrame(focusLoop);
        }

        let revealTimeout;
        document.getElementById('revealBtn').addEventListener('click', () => {
            if (!isFocusing) return;
            hiddenTime.style.opacity = '0.7';
            hiddenTime.style.filter = 'blur(0px)';
            
            clearTimeout(revealTimeout);
            revealTimeout = setTimeout(() => {
                hiddenTime.style.opacity = '0';
                hiddenTime.style.filter = 'blur(4px)';
            }, 3000);
        });

        // 手机端长按放弃优化
        const cancelBtn = document.getElementById('cancelBtn');
        const cancelRing = document.getElementById('cancelRing');
        const circumference = 2 * Math.PI * 45;
        let holdTimer = null;
        let holdProgress = 0;

        function updateRing(percent) {
            const offset = circumference - (percent / 100) * circumference;
            cancelRing.style.strokeDashoffset = offset;
        }

        function startHold(e) {
            if(e.cancelable) e.preventDefault();
            holdProgress = 0;
            updateRing(holdProgress);
            cancelBtn.classList.add('text-white');
            
            holdTimer = setInterval(() => {
                holdProgress += (50 / 3000) * 100;
                updateRing(holdProgress);
                
                if (holdProgress >= 100) {
                    clearInterval(holdTimer);
                    abandonFocus();
                }
            }, 50);
        }

        function stopHold() {
            clearInterval(holdTimer);
            holdProgress = 0;
            updateRing(100);
            cancelBtn.classList.remove('text-white');
        }

        // 兼容手机触摸
        cancelBtn.addEventListener('touchstart', startHold);
        cancelBtn.addEventListener('touchend', stopHold);
        cancelBtn.addEventListener('touchcancel', stopHold);
        cancelBtn.addEventListener('pointerdown', startHold);
        cancelBtn.addEventListener('pointerup', stopHold);
        cancelBtn.addEventListener('pointerleave', stopHold);

        function abandonFocus() {
            isFocusing = false;
            cancelAnimationFrame(animationId);
            setAudioState('silence');
            window.currentSessionData = null;
            switchView(VIEWS.HOME);
        }

        function endFocus() {
            isFocusing = false;
            cancelAnimationFrame(animationId);
            setAudioState('silence');
            
            if (window.currentSessionData) {
                Storage.save(window.currentSessionData);
            }
            
            ctx.clearRect(0, 0, width, height);
            switchView(VIEWS.GALLERY);
        }

        function resetState() {
            isFocusing = false;
            strokes = []; globalLength = 0; timeMinutes = 0; particles = [];
            timeEstimate.innerText = '00';
            centerPrompt.style.opacity = '0.5';
            bottomToolbar.classList.remove('opacity-100', 'translate-y-0');
            bottomToolbar.classList.add('opacity-0', 'translate-y-8');
            ctx.clearRect(0, 0, width, height);
        }

        /**
         * 6. 渲染核心 (手机性能优化)
         */
        class Particle {
            constructor(x, y, hue) {
                this.x = x; this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 0.8 + 0.2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1.0;
                this.hue = hue;
                this.size = Math.random() * 0.8 + 0.2;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.life -= 0.04;
            }
            draw(ctx) {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = `hsla(${this.hue}, 60%, 60%, 0.7)`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function renderCanvas() {
            if (isFocusing) {
                ctx.globalCompositeOperation = 'source-over';
                ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                ctx.fillRect(0, 0, width, height);
                ctx.globalCompositeOperation = 'screen'; 
            } else {
                ctx.clearRect(0, 0, width, height);
            }

            if (strokes.length === 0) return;

            const now = performance.now();
            const growProgress = isFocusing ? (1 - (timeRemainingMs / totalTimeMs)) : 1;
            const targetLen = globalLength * growProgress;

            const currentHue = mainHue;
            const saturation = isFocusing ? (growProgress * 30 + 40) : 60;
            const lightness = isFocusing ? (growProgress * 15 + 40) : 50;

            const segmentAngle = Math.PI * 2 / symCount;
            let localCutPointThisFrame = null;

            if (isFocusing) {
                for (let i = particles.length - 1; i >= 0; i--) {
                    particles[i].update();
                    if (particles[i].life <= 0) particles.splice(i, 1);
                }
            }

            let evenRot = 0;
            let oddRot = 0;
            let scaleEven = 1;
            let scaleOdd = 1;

            if (isFocusing) {
                const totalRotations = Math.max(1, Math.ceil(totalTimeMs / (120 * 1000))); 
                const totalAngleToRotate = totalRotations * Math.PI * 2;
                
                evenRot = growProgress * totalAngleToRotate;
                oddRot = -growProgress * totalAngleToRotate;

                scaleEven = 1 + 0.03 * Math.sin(now / 1800);
                scaleOdd  = 1 + 0.03 * Math.sin(now / 2700);
            }

            for (let i = 0; i < symCount; i++) {
                ctx.save();
                ctx.translate(cx, cy);
                
                const baseAngle = segmentAngle * i;
                const isEven = (i % 2 === 0);
                
                const dynamicRot = isEven ? evenRot : oddRot;
                const totalAngle = baseAngle + dynamicRot;
                ctx.rotate(totalAngle);
                
                if (!isEven) ctx.scale(1, -1); 
                const currentScale = isEven ? scaleEven : scaleOdd;
                ctx.scale(currentScale, currentScale);

                if (isFocusing) {
                    ctx.beginPath();
                    ctx.strokeStyle = `rgba(255, 255, 255, 0.03)`; 
                    ctx.shadowBlur = 0;
                    ctx.lineWidth = 1;
                    for (let s = 0; s < strokes.length; s++) {
                        const stroke = strokes[s];
                        if (stroke.points.length === 0) continue;
                        ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
                        for (let p = 1; p < stroke.points.length; p++) {
                            ctx.lineTo(stroke.points[p].x, stroke.points[p].y);
                        }
                    }
                    ctx.stroke();
                }

                ctx.beginPath();
                ctx.lineCap = 'round'; 
                ctx.lineJoin = 'round';
                ctx.lineWidth = 1.2;
                ctx.strokeStyle = `hsl(${currentHue}, ${saturation}%, ${lightness}%)`;
                ctx.shadowBlur = isFocusing ? 4 : 2;
                ctx.shadowColor = `hsl(${currentHue}, ${saturation}%, ${lightness}%)`;
                
                let isPathCut = false;
                
                for (let s = 0; s < strokes.length; s++) {
                    const stroke = strokes[s];
                    if (stroke.points.length === 0) continue;
                    
                    const firstPt = stroke.points[0];
                    if (firstPt.gl > targetLen) break;
                    
                    ctx.moveTo(firstPt.x, firstPt.y);
                    
                    for (let p = 1; p < stroke.points.length; p++) {
                        const pt = stroke.points[p];
                        const prevPt = stroke.points[p-1];
                        
                        if (pt.gl <= targetLen) {
                            ctx.lineTo(pt.x, pt.y);
                        } else {
                            let ratio = (targetLen - prevPt.gl) / (pt.gl - prevPt.gl);
                            if (isNaN(ratio) || !isFinite(ratio)) ratio = 1;
                            const exactX = prevPt.x + (pt.x - prevPt.x) * ratio;
                            const exactY = prevPt.y + (pt.y - prevPt.y) * ratio;
                            ctx.lineTo(exactX, exactY);
                            isPathCut = true;
                            
                            if (i === 0 && isFocusing) {
                                localCutPointThisFrame = { x: exactX, y: exactY };
                            }
                            break;
                        }
                    }
                    if (isPathCut) break;
                }
                ctx.globalAlpha = 1;
                ctx.stroke();
                
                if (isFocusing && particles.length > 0) {
                    ctx.shadowBlur = 0;
                    particles.forEach(p => p.draw(ctx));
                }

                ctx.restore();
            }

            if (isFocusing) {
                const totalSec = Math.ceil(timeRemainingMs / 1000);
                hiddenTime.innerText = `${Math.floor(totalSec / 60).toString().padStart(2,'0')}:${(totalSec % 60).toString().padStart(2,'0')}`;
            }

            if (isFocusing && localCutPointThisFrame && Math.random() < 0.3) {
                particles.push(new Particle(localCutPointThisFrame.x, localCutPointThisFrame.y, mainHue));
            }
        }

        function focusLoop(now) {
            if (!isFocusing) return;
            
            const dt = now - lastFrameTime;
            lastFrameTime = now;
            timeRemainingMs -= dt;
            
            if (timeRemainingMs <= 0) {
                timeRemainingMs = 0;
                endFocus(); 
                return;
            }
            
            renderCanvas();
            animationId = requestAnimationFrame(focusLoop);
        }

        /**
         * 7. 音频引擎
         */
        function initAudio() {
            if (audioCtx) return;
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

            noiseNode = audioCtx.createBufferSource();
            noiseNode.buffer = buffer;
            noiseNode.loop = true;

            filterNode = audioCtx.createBiquadFilter();
            filterNode.type = 'lowpass';
            filterNode.frequency.value = 1000;

            gainNode = audioCtx.createGain();
            gainNode.gain.value = 0;

            noiseNode.connect(filterNode);
            filterNode.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            noiseNode.start();
        }

        function setAudioState(state) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            if (state === 'drawing') {
                gainNode.gain.setTargetAtTime(0.08, now, 0.1);
                filterNode.frequency.setTargetAtTime(1500, now, 0.1);
            } else if (state === 'focus') {
                gainNode.gain.setTargetAtTime(0.25, now, 2.0);
                filterNode.frequency.setTargetAtTime(350, now, 2.0);
            } else if (state === 'silence') {
                gainNode.gain.setTargetAtTime(0, now, 0.5);
            }
        }

    </script>
